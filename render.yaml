# Render.com deployment config for FastAPI backend (FREE tier)
services:
  - type: web
    name: graphbuilder-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USERNAME
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: NEO4J_DATABASE
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: API_SECRET_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"
